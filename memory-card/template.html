<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>记忆卡片 — 主题标题</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --theme: #326CE5;          /* 主题色，按技术栈调整 */
    --ink: #1A2B3C;
    --gray: #5C6B7A;
    --chip-bg: #2F4156;
    --red: #D32F2F;
    --red-bg: #FFEBEE;
    --green: #2E7D32;
    --s1-bg: #ECEFF1;          /* 区块底色，可按需增减 */
    --s2-bg: #E3F2FD;
    --s3-bg: #E8F5E9;
  }
  /* ===== 风格预设：<body data-theme="..."> 切换（默认 blueprint 即 :root）。
     变量只是底色，字体层级/纹理/圆角/留白要按 SKILL.md 设计原则继续打磨 ===== */
  body[data-theme="vivid"] {
    --theme: #D9480F; --ink: #43302B; --gray: #8C7B75; --chip-bg: #A63C06;
    --red: #C2255C; --red-bg: #FFF0F6; --green: #2B8A3E;
    --s1-bg: #FFF4E6; --s2-bg: #FFEDD8; --s3-bg: #EBFBEE;
  }
  body[data-theme="vivid"] #card { border-radius: 26px; }
  body[data-theme="vivid"] .kcard, body[data-theme="vivid"] .chip { border-radius: 14px; }
  body[data-theme="minimal"] {
    --theme: #111111; --ink: #111111; --gray: #767676; --chip-bg: #111111;
    --red: #E03131; --red-bg: #FFF5F5; --green: #111111;
    --s1-bg: #F5F5F5; --s2-bg: #FBFBFB; --s3-bg: #F5F5F5;
  }
  body[data-theme="minimal"] #card, body[data-theme="minimal"] .kcard,
  body[data-theme="minimal"] .chip { border-radius: 3px; }
  body[data-theme="terminal"] {
    --theme: #58A6FF; --ink: #C9D1D9; --gray: #8B949E; --chip-bg: #1F6FEB;
    --red: #F85149; --red-bg: #2D1517; --green: #3FB950;
    --s1-bg: #161B22; --s2-bg: #10171F; --s3-bg: #12211A;
  }
  body[data-theme="terminal"] #card { background: #0D1117; border-color: #30363D; }
  body[data-theme="terminal"] .kcard { background: #161B22; border-color: #30363D; }
  body[data-theme="terminal"] .wtable { background: #161B22; border-color: #30363D; }
  body[data-theme="terminal"] .wtable .cell { border-color: #21262D; }
  body[data-theme="terminal"] .diamond::before, body[data-theme="terminal"] .done-badge span,
  body[data-theme="terminal"] .side-card { background: #161B22; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
         background: #F0F2F5; color: var(--ink); }
  .mono { font-family: Consolas, 'Courier New', monospace; }

  /* ===== 页面双栏布局（此结构不要改动） ===== */
  html, body { height: 100%; }
  .page { display: flex; gap: 24px; padding: 20px; height: 100vh; max-width: 1560px;
          margin: 0 auto; overflow: hidden; }
  .left { flex: 0 0 auto; height: 100%; overflow-y: auto; overflow-x: hidden; padding-right: 14px; }
  .right { flex: 1 1 0; min-width: 420px; height: 100%; display: flex;
           flex-direction: column; gap: 14px; }

  /* ===== 卡片画布 ===== */
  #card { width: 880px; background: #fff; border: 1.5px solid #E0E0E0;
          border-radius: 18px; padding: 22px 20px; }

  /* 卡片标题区 */
  .card-head { display: flex; align-items: center; gap: 14px; padding: 4px 8px 18px; }
  /* logo 槽：内联 SVG（已知技术）或缩写字（未知技术）；禁止 Unicode 图标字符 */
  .card-logo { width: 46px; height: 46px; border-radius: 10px; background: var(--theme);
               color: #fff; display: flex; align-items: center; justify-content: center;
               font-family: Consolas, monospace; font-weight: bold; font-size: 17px; }
  .card-logo svg { width: 32px; height: 32px; }
  .card-title { font-size: 24px; font-weight: bold; color: var(--theme); }
  .card-sub { font-size: 12.5px; color: var(--gray); margin-top: 4px; }

  /* 区块 */
  .sec { border-radius: 14px; padding: 16px 18px; position: relative; }
  .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .sec-num { width: 26px; height: 26px; border-radius: 50%; color: #fff; font-weight: bold;
             font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .sec-title { font-size: 19px; font-weight: bold; }
  .sec-note { margin-left: auto; font-size: 12px; }

  /* 白卡（一个扩展点/步骤） */
  .kcard { background: #fff; border: 1px solid #CFD8DC; border-radius: 10px;
           padding: 12px 14px; }
  .kcard + .kcard { margin-top: 0; }
  .kcard-title { font-size: 15px; font-weight: bold; font-family: Consolas, monospace; }
  .kcard-anno { font-size: 12px; color: var(--gray); font-weight: normal; margin-left: 8px; }
  .kcard-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* 插件标签 */
  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 9px; }
  .chip { background: var(--chip-bg); color: #fff; font-family: Consolas, monospace;
          font-size: 11.5px; padding: 4px 9px; border-radius: 5px; white-space: nowrap; }
  .chip.red { background: var(--red); }
  .chip-sep { color: var(--gray); font-size: 13px; align-self: center; }

  /* 旁注 */
  .note { font-size: 11.5px; color: var(--gray); margin-top: 8px; }
  .note.warn { color: var(--red); }

  /* 卡片间流向箭头 */
  .flow-arrow { display: flex; justify-content: center; padding: 5px 0; }
  .flow-arrow::after { content: ''; width: 0; height: 0;
       border-left: 7px solid transparent; border-right: 7px solid transparent;
       border-top: 10px solid var(--theme); }
  .flow-arrow.line { position: relative; height: 24px; }
  .flow-arrow.line::before { content: ''; position: absolute; top: 0; bottom: 10px;
       left: 50%; width: 2px; margin-left: -1px; background: var(--theme); }
  .flow-arrow.green::after { border-top-color: var(--green); }
  .flow-arrow.green.line::before { background: var(--green); }

  /* 区块之间的大箭头 */
  .big-arrow { display: flex; justify-content: center; padding: 10px 0; }
  .big-arrow::after { content: ''; width: 0; height: 0;
       border-left: 20px solid transparent; border-right: 20px solid transparent;
       border-top: 24px solid var(--theme); }

  /* 主线 + 旁路卡的两栏排布 */
  .with-side { display: flex; gap: 14px; align-items: stretch; }
  .with-side .main-col { flex: 1 1 0; min-width: 0; }
  .side-card { flex: 0 0 178px; background: var(--red-bg); border: 1.2px solid var(--red);
               border-radius: 10px; padding: 12px 10px; text-align: center; align-self: center; }
  .side-card .sc-title { color: var(--red); font-weight: bold; font-size: 14px;
                         font-family: Consolas, monospace; }
  .side-card .sc-sub { color: var(--red); font-size: 10.5px; margin: 2px 0 8px; }
  .side-card .note { color: #B71C1C; margin-top: 6px; }
  .side-card .chip { display: inline-block; }

  /* 权重/属性表 */
  .wtable { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid #B0BEC5;
            background: #FAFBFC; margin-top: 9px; }
  .wtable .cell { border: 0.5px solid #CFD8DC; padding: 7px 4px; text-align: center; }
  .wtable .cell .nm { font-family: Consolas, monospace; font-size: 10.5px; display: block; }
  .wtable .cell .nm.small { font-size: 9.5px; }
  .wtable .cell .wt { color: var(--theme); font-weight: bold; font-size: 12px; }

  /* 决策菱形 */
  .diamond-wrap { display: flex; justify-content: center; padding: 4px 0; }
  .diamond { width: 224px; height: 64px; position: relative; }
  .diamond::before { content: ''; position: absolute; left: 50%; top: 50%;
       width: 90px; height: 90px; margin: -45px 0 0 -45px; background: #fff;
       border: 1.6px solid var(--theme);
       transform: scaleX(1.7) scaleY(.45) rotate(45deg); }
  .diamond span { position: absolute; inset: 0; display: flex; align-items: center;
       justify-content: center; color: var(--theme); font-weight: bold; font-size: 13.5px; }

  /* 回退/失败路径（绝对定位虚线，父容器须 position:relative） */
  .return-path { position: absolute; border: 0 dashed var(--red); pointer-events: none; }
  .return-path.v { border-left-width: 2px; width: 0; }
  .return-path.h { border-top-width: 2px; height: 0; }
  .return-arrow { position: absolute; width: 0; height: 0; }
  .return-arrow.up { border-left: 6px solid transparent; border-right: 6px solid transparent;
                     border-bottom: 9px solid var(--red); }
  .return-arrow.left { border-top: 6px solid transparent; border-bottom: 6px solid transparent;
                       border-right: 9px solid var(--red); }
  .return-arrow.right { border-top: 6px solid transparent; border-bottom: 6px solid transparent;
                        border-left: 9px solid var(--red); }
  .return-label { position: absolute; color: var(--red); font-size: 11.5px;
                  background: #fff; padding: 2px 4px; border-radius: 4px; }
  .return-label.vert { writing-mode: vertical-rl; letter-spacing: 2px; }

  /* 成功徽章 */
  .done-badge { display: flex; justify-content: center; margin-top: 14px; }
  .done-badge span { background: var(--green); color: #fff; font-size: 16px; font-weight: bold;
                     padding: 11px 42px; border-radius: 26px; }

  .card-foot { text-align: center; font-size: 11px; color: var(--gray); padding-top: 16px; }

  /* ===== 右侧发布面板（此结构不要改动） ===== */
  .panel { background: #fff; border: 1px solid #E0E0E0; border-radius: 14px; padding: 20px; }
  .panel + .panel { margin-top: 0; }
  .panel.grow { flex: 1 1 0; min-height: 0; display: flex; flex-direction: column; }
  .panel.grow #pub-body { flex: 1 1 0; min-height: 0; }
  .panel h3 { font-size: 15px; margin-bottom: 10px; display: flex; align-items: center; }
  .copy-btn, .dl-btn { margin-left: auto; border: none; border-radius: 7px; padding: 6px 14px;
       font-size: 12.5px; cursor: pointer; color: #fff; background: var(--theme); }
  .copy-btn:hover, .dl-btn:hover { opacity: .85; }
  .dl-row { display: flex; gap: 10px; align-items: center; }
  .dl-row select { padding: 5px 8px; border-radius: 7px; border: 1px solid #CFD8DC; font-size: 12.5px; }
  .title-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
       background: #FAFBFC; border: 1px solid #ECEFF1; border-radius: 8px; }
  .title-item + .title-item { margin-top: 8px; }
  .ti-tag { flex: 0 0 auto; font-size: 11px; color: #fff; background: var(--gray);
       padding: 2px 8px; border-radius: 4px; }
  .ti-tag.main { background: var(--theme); }
  .ti-text { flex: 1 1 0; font-size: 13.5px; line-height: 1.5; }
  .title-item .copy-btn { margin-left: 0; flex: 0 0 auto; padding: 4px 10px; }
  #pub-body { white-space: pre-wrap; font-size: 13.5px; line-height: 1.8;
       background: #FAFBFC; border: 1px solid #ECEFF1; border-radius: 8px; padding: 14px;
       overflow-y: auto; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
       background: var(--ink); color: #fff; padding: 9px 22px; border-radius: 8px;
       font-size: 13px; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="page">

  <!-- ===================== 左：记忆卡片 ===================== -->
  <div class="left">
    <div id="card">
      <!--
        在此绘制卡片。可用组件：
        .card-head 标题区 | .sec 彩底区块 | .kcard 白卡 | .chips/.chip 标签组
        .flow-arrow(.line/.green) 流向箭头 | .big-arrow 区块大箭头
        .with-side + .side-card 主线旁路卡 | .wtable 权重表
        .diamond 决策菱形 | .note(.warn) 旁注 | .return-path/.return-arrow/.return-label 失败回路
        .done-badge 成功徽章 | .card-foot 来源页脚
        示例结构（生成时整体替换）:
      -->
      <div class="card-head">
        <!-- logo：已知技术画内联 SVG 简化标识；否则缩写字，如 <div class="card-logo">K8s</div> -->
        <div class="card-logo">XX</div>
        <div>
          <div class="card-title">主题标题占位</div>
          <div class="card-sub">副标题 · 版本 · 约定说明</div>
        </div>
      </div>

      <div class="sec" style="background: var(--s1-bg)">
        <div class="sec-head">
          <div class="sec-num" style="background:#37474F">1</div>
          <div class="sec-title" style="color:#37474F">区块一</div>
        </div>
        <div class="kcard">
          <span class="kcard-title">StepName</span><span class="kcard-anno">注解</span>
          <div class="chips">
            <span class="chip">ExamplePluginA</span>
            <span class="chip-sep">→</span>
            <span class="chip">ExamplePluginB</span>
          </div>
          <div class="note">旁注说明</div>
        </div>
      </div>

      <div class="big-arrow"></div>

      <div class="sec" style="background: var(--s2-bg)">
        <div class="sec-head">
          <div class="sec-num" style="background:var(--theme)">2</div>
          <div class="sec-title" style="color:var(--theme)">区块二</div>
        </div>
        <div class="kcard">
          <span class="kcard-title">StepName</span>
          <div class="chips"><span class="chip">ExamplePluginC</span></div>
        </div>
        <div class="flow-arrow line"></div>
        <div class="kcard">
          <span class="kcard-title">NextStep</span>
        </div>
      </div>

      <div class="card-foot">基于 <span class="mono">repo@branch</span> 源码核对 · YYYY-MM-DD</div>
    </div>
  </div>

  <!-- ===================== 右：发布内容 ===================== -->
  <div class="right">
    <div class="panel">
      <h3>下载卡片 PNG（无损）
        <span class="dl-row" style="margin-left:auto">
          <select id="dl-scale">
            <option value="2">2× 高清</option>
            <option value="3" selected>3× 超清</option>
            <option value="4">4× 打印级</option>
          </select>
          <button class="dl-btn" onclick="downloadPNG()">下载 PNG</button>
        </span>
      </h3>
      <div style="font-size:12px;color:var(--gray)">导出为无损 PNG；首次使用需联网加载 html2canvas。</div>
    </div>

    <div class="panel">
      <h3>标题</h3>
      <div class="title-item">
        <span class="ti-tag main">主</span>
        <div class="ti-text" id="title-main">主标题占位</div>
        <button class="copy-btn" onclick="copyText('title-main')">复制</button>
      </div>
      <div class="title-item">
        <span class="ti-tag">备选</span>
        <div class="ti-text" id="title-alt1">备选标题一占位</div>
        <button class="copy-btn" onclick="copyText('title-alt1')">复制</button>
      </div>
      <div class="title-item">
        <span class="ti-tag">备选</span>
        <div class="ti-text" id="title-alt2">备选标题二占位</div>
        <button class="copy-btn" onclick="copyText('title-alt2')">复制</button>
      </div>
    </div>

    <div class="panel grow">
      <h3>正文（纯文本，可直接粘贴公众号）<button class="copy-btn" onclick="copyText('pub-body')">复制</button></h3>
      <div id="pub-body">正文占位。纯文本、中文全角标点、短段落，生成时按 SKILL.md 文案规范写入。</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
function copyText(id) {
  navigator.clipboard.writeText(document.getElementById(id).innerText)
    .then(() => toast('已复制'))
    .catch(() => toast('复制失败，请手动选择'));
}
function downloadPNG() {
  const scale = parseInt(document.getElementById('dl-scale').value, 10);
  const card = document.getElementById('card');
  toast('正在渲染 ' + scale + '× PNG…');
  html2canvas(card, { scale, backgroundColor: '#FFFFFF', useCORS: true, logging: false })
    .then(canvas => canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (document.title || 'memory-card') + '@' + scale + 'x.png';
      a.click();
      URL.revokeObjectURL(a.href);
      toast('已下载');
    }, 'image/png'))
    .catch(() => toast('渲染失败：请检查网络（html2canvas 未加载）'));
}

/* 若卡片含失败/回退路径（.return-path 等），不要手调像素：
   给关键节点加 id，在 load 后用 getBoundingClientRect 相对 #card 计算坐标，
   动态拼出 .return-path/.return-arrow/.return-label 注入占位容器。
   旁路卡（.side-card 绝对定位）也在此一并与对应主线卡垂直居中对齐。 */
function layoutPaths() {
  // 按需实现；无回路时删除本函数及监听。
}
window.addEventListener('load', layoutPaths);
</script>
</body>
</html>
